name: Deploy to IONOS

# Auto-deploy the static site to IONOS web hosting via SFTP on every
# push to main. Matches the existing IONOS convention used by the
# other Pragticality Ltd sites (one SFTP user per product, scoped
# to its own directory: /Pragticality/, /Gnomon/, /Gubernis/).
#
# Required GitHub repository secrets
# (Settings → Secrets and variables → Actions):
#   IONOS_FTP_SERVER    — IONOS SFTP hostname
#                         (e.g. access-5018101164.webspace-host.com)
#   IONOS_FTP_USER      — IONOS SFTP username (a2xxxxxxx)
#   IONOS_FTP_PASSWORD  — IONOS SFTP password
#   IONOS_FTP_PATH      — remote directory (e.g. /Gubernis/)
#
# Protocol: SFTP over SSH on port 22 (NOT FTPS). The IONOS account
# is provisioned as SFTP-only.

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows a manual run from the Actions tab

jobs:
  deploy:
    name: Sync static files to IONOS via SFTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to IONOS via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.IONOS_FTP_SERVER }}
          username: ${{ secrets.IONOS_FTP_USER }}
          password: ${{ secrets.IONOS_FTP_PASSWORD }}
          port: 22
          local_path: './*'
          remote_path: ${{ secrets.IONOS_FTP_PATH }}
          sftp_only: true
          # Repo meta + docs are not part of the deployed site.
          exclude_list: |
            .git/*
            .github/*
            CLAUDE.md
            SESSION_START.md
            README.md
            .gitignore
