name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Mirror of gnomon-website/.github/workflows/deploy.yml — same pattern, same
# IONOS account, dedicated SFTP user (Gubernis = a2016447) chrooted to
# /Gubernis/ on the server. lftp uploads to "/" because the chroot root IS
# admin-view /Gubernis/.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   IONOS_FTP_HOST  — access-5018101164.webspace-host.com
#   IONOS_FTP_USER  — a2016447
#   IONOS_FTP_PASS  — password for that SFTP user

jobs:
  sftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage deployable files
        # Public site files only. Repo-internal files (.git, README,
        # CLAUDE.md, SESSION_START.md, .github/, scripts/) are NOT deployed.
        run: |
          mkdir -p dist
          cp index.html styles.css favicon.svg robots.txt sitemap.xml dist/
          # Apache .htaccess for HTTPS + apex canonicalisation.
          cp .htaccess dist/ 2>/dev/null || true
          # Legal pages (privacy, terms, etc.) — recursive copy of any
          # top-level subdirectory that holds public legal/policy content.
          for dir in privacy terms about; do
            if [ -d "$dir" ]; then cp -r "$dir" dist/; fi
          done
          # Search-engine verification files at repo root — match any
          # present, fail silently if none.
          cp google*.html dist/ 2>/dev/null || true
          cp BingSiteAuth.xml dist/ 2>/dev/null || true

      - name: Patch Watch counter with live engine numbers
        # Calls the public /gubernis/watch-counter JSON endpoint on the
        # Railway-hosted FastAPI app and substitutes the ledger values
        # into dist/index.html. Fail-soft — if the endpoint is unreachable
        # the deploy proceeds with whatever numbers are baked into the repo.
        run: |
          python3 scripts/patch_watch_counter.py \
            --endpoint https://pragticality-production.up.railway.app/gubernis/watch-counter \
            --html dist/index.html

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      # No --delete: manually placed files on the server (Google Search
      # Console verification HTML, Let's Encrypt challenge files, etc.)
      # are left alone. Password passed via env var so special characters
      # don't break shell quoting.
      - name: Deploy via lftp
        env:
          SFTP_HOST: ${{ secrets.IONOS_FTP_HOST }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USER }}
          LFTP_PASSWORD: ${{ secrets.IONOS_FTP_PASS }}
        run: |
          lftp -u "$SFTP_USER" --env-password "sftp://$SFTP_HOST:22" <<EOF
          set sftp:auto-confirm yes
          pwd
          mirror -R --verbose --no-perms --no-symlinks ./dist/ /
          bye
          EOF
